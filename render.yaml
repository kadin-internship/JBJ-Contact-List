# Render Blueprint -- https://render.com/docs/blueprint-spec
# On render.com: New -> Blueprint -> connect this repo. Render reads this
# file and creates the service below automatically.
services:
  - type: web
    name: jbj-contact-hub
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    # Gunicorn defaults to a single sync worker, which handles one request
    # at a time -- fine for one person testing, but it queues up and stalls
    # under real concurrent traffic regardless of how big the paid plan is.
    # --workers 5 --threads 4 gives 20 requests' worth of headroom (most of
    # this app's work is waiting on the database or the Anthropic API, which
    # threads handle well); see docs/scaling-and-costs.md for the reasoning
    # and the instance-size tradeoffs.
    startCommand: gunicorn wsgi:app --bind 0.0.0.0:$PORT --workers 5 --threads 4 --worker-class gthread --timeout 60
    healthCheckPath: /login
    envVars:
      # Free Render web services don't get a persistent disk, so the
      # database lives in an external free Postgres (e.g. Neon, Supabase)
      # instead of a local SQLite file. Set this directly in the
      # dashboard's Environment tab -- it's a credential, never put it
      # in this file or in chat. See README's "Deploying" section for
      # how to create the database and migrate existing data into it.
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      # Optional -- error monitoring only initializes if this is set (see
      # app.py). Leave unset to skip it; create a free Sentry project and
      # paste its DSN here to turn it on.
      - key: SENTRY_DSN
        sync: false
      # Optional -- only needed to send from the Email Builder. Provider-
      # agnostic SMTP, see README's Setup section for what each var means
      # and why a real transactional provider (SendGrid/Mailgun/Postmark)
      # is recommended over a personal email account's SMTP.
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_FROM_EMAIL
        sync: false
      - key: SMTP_FROM_NAME
        sync: false
      - key: SMTP_USE_TLS
        sync: false
      # One-time use: creates the first admin login on startup if the users
      # table is empty, since Render's Shell tab needs a paid plan. Set these
      # in the dashboard's Environment tab, deploy once, then they can be
      # cleared -- the app won't run this again once any user exists.
      - key: BOOTSTRAP_ADMIN_USERNAME
        sync: false
      - key: BOOTSTRAP_ADMIN_PASSWORD
        sync: false
      - key: BOOTSTRAP_ADMIN_DISPLAY_NAME
        sync: false
