<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Admin — JBJ Management</title>
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <div class="brand">
        <a href="/" class="btn">← Back</a>
        <h2>Admin</h2>
      </div>
      <div>
        <button id="exportBtn" class="btn">Export CSV</button>
      </div>
    </div>
  </header>

  <main class="container admin-area">
    <section class="card admin-upload">
      <div id="dropZone" class="dropzone">Drop CSV/Excel here or <button id="pickFile" class="btn">Choose file</button></div>
      <input id="adminFile" type="file" accept=".csv, application/vnd.ms-excel, application/vnd.openxmlformats-officedocument.spreadsheetml.sheet" style="display:none;" />
      <div class="progress-wrap" style="display:none;">
        <label>Import progress</label>
        <div class="progress"><div id="progressBar" class="progress-bar" style="width:0%"></div></div>
      </div>
      <div id="importSummary" class="import-summary" style="display:none;"></div>
    </section>
  </main>

  <script src="/static/js/admin.js"></script>
</body>
</html>
