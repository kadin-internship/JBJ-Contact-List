<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Book a Meeting - JBJ Management</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="/static/css/style.css">
  <style>
    body { background: var(--bg, #f8f8f6); }
    .book-wrap { max-width: 760px; margin: 48px auto; padding: 0 16px 64px; }
    .book-header { margin-bottom: 32px; }
    .book-header h1 { font-family: 'Archivo Black', sans-serif; font-size: 28px; margin: 0 0 6px; }
    .book-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; align-items: start; }
    @media (max-width: 600px) { .book-layout { grid-template-columns: 1fr; } }

    /* Calendar */
    .cal-card { background: #fff; border-radius: 14px; border: 1px solid rgba(148,153,156,0.2); padding: 20px; }
    .cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
    .cal-nav button { background: none; border: none; cursor: pointer; font-size: 18px; color: var(--muted); padding: 4px 8px; border-radius: 6px; }
    .cal-nav button:hover { background: rgba(0,0,0,0.06); }
    .cal-title { font-weight: 700; font-size: 15px; }
    .cal-grid { display: grid; grid-template-columns: repeat(7,1fr); gap: 2px; }
    .cal-day-label { text-align: center; font-size: 11px; font-weight: 600; color: var(--muted); padding: 4px 0; }
    .cal-cell { aspect-ratio: 1; display: flex; align-items: center; justify-content: center; font-size: 13px; border-radius: 8px; cursor: default; color: var(--muted); }
    .cal-cell.available { color: var(--text, #111); cursor: pointer; font-weight: 600; }
    .cal-cell.available:hover { background: rgba(173,3,4,0.1); color: var(--primary, #AD0304); }
    .cal-cell.selected { background: var(--primary, #AD0304); color: #fff !important; }
    .cal-cell.past { opacity: 0.35; }
    .cal-cell.today { outline: 2px solid var(--primary, #AD0304); outline-offset: -2px; }

    /* Slots */
    .slots-card { background: #fff; border-radius: 14px; border: 1px solid rgba(148,153,156,0.2); padding: 20px; }
    .slots-title { font-weight: 700; font-size: 15px; margin: 0 0 14px; }
    .slots-grid { display: grid; grid-template-columns: repeat(2,1fr); gap: 8px; }
    .slot-btn { padding: 10px 6px; border-radius: 8px; border: 1.5px solid rgba(148,153,156,0.3); background: none; cursor: pointer; font-size: 13px; font-weight: 600; font-family: inherit; transition: border-color .15s, background .15s; }
    .slot-btn:hover { border-color: var(--primary, #AD0304); color: var(--primary, #AD0304); }
    .slot-btn.selected { background: var(--primary, #AD0304); border-color: var(--primary, #AD0304); color: #fff; }

    /* Form */
    .form-card { background: #fff; border-radius: 14px; border: 1px solid rgba(148,153,156,0.2); padding: 20px; margin-top: 24px; }
    .form-card h3 { margin: 0 0 16px; font-size: 15px; }
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    @media (max-width: 480px) { .form-grid { grid-template-columns: 1fr; } }
    .form-field { display: flex; flex-direction: column; gap: 4px; }
    .form-field.full { grid-column: 1/-1; }
    .form-field label { font-size: 12px; font-weight: 600; color: var(--muted); }
    .form-field input, .form-field textarea { padding: 9px 12px; border-radius: 8px; border: 1px solid rgba(148,153,156,0.4); font-family: inherit; font-size: 14px; }
    .form-field textarea { resize: vertical; min-height: 72px; }
    #bookSubmitBtn { margin-top: 16px; width: 100%; }
    .book-confirm { text-align: center; padding: 40px 20px; }
    .book-confirm .confirm-icon { font-size: 48px; color: var(--green, #1E7B34); margin-bottom: 12px; }
    .book-confirm h2 { margin: 0 0 8px; }
  </style>
</head>
<body>
  <div class="book-wrap">
    <div class="book-header">
      <h1><i class="fas fa-calendar-check" style="color:var(--primary,#AD0304);margin-right:10px;"></i>Book a Meeting</h1>
      <p class="muted" style="margin:0;font-size:14px;">Select a date and time to schedule a meeting with JBJ Management.</p>
    </div>

    <div id="bookingFlow">
      <div class="book-layout">
        <!-- Calendar -->
        <div class="cal-card">
          <div class="cal-nav">
            <button id="calPrev"><i class="fas fa-chevron-left"></i></button>
            <span class="cal-title" id="calTitle"></span>
            <button id="calNext"><i class="fas fa-chevron-right"></i></button>
          </div>
          <div class="cal-grid" id="calGrid"></div>
        </div>

        <!-- Time slots -->
        <div class="slots-card">
          <div class="slots-title" id="slotsTitle">Select a date</div>
          <div id="slotsGrid" class="slots-grid"></div>
        </div>
      </div>

      <!-- Contact form (shown after slot selected) -->
      <div class="form-card" id="bookFormCard" style="display:none;">
        <h3>Your details</h3>
        <div class="form-grid">
          <div class="form-field">
            <label>Full name *</label>
            <input id="bfName" type="text" placeholder="Jane Smith" required>
          </div>
          <div class="form-field">
            <label>Email *</label>
            <input id="bfEmail" type="email" placeholder="jane@example.com" required>
          </div>
          <div class="form-field">
            <label>Phone</label>
            <input id="bfPhone" type="tel" placeholder="(555) 000-0000">
          </div>
          <div class="form-field full">
            <label>Notes (optional)</label>
            <textarea id="bfNotes" placeholder="Anything you'd like us to know…"></textarea>
          </div>
        </div>
        <div id="bfError" style="color:#9b1c1c;font-size:13px;margin-top:8px;display:none;"></div>
        <button id="bookSubmitBtn" class="btn btn-primary"><i class="fas fa-calendar-check"></i> Confirm Booking</button>
      </div>
    </div>

    <!-- Success screen -->
    <div id="bookConfirm" class="form-card book-confirm" style="display:none;">
      <div class="confirm-icon"><i class="fas fa-circle-check"></i></div>
      <h2>You're booked!</h2>
      <p class="muted" id="confirmDetails" style="margin:0 0 20px;"></p>
      <p style="font-size:13px;color:var(--muted);">A confirmation email has been sent to <strong id="confirmEmail"></strong>.</p>
      <a href="/book" class="btn" style="margin-top:16px;">Book another</a>
    </div>
  </div>

  <script>
    const DAY_NAMES = ['Su','Mo','Tu','We','Th','Fr','Sa']
    const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December']

    let calYear, calMonth, selectedDate = null, selectedSlot = null, availableDays = new Set()

    const today = new Date()
    calYear  = today.getFullYear()
    calMonth = today.getMonth()

    async function loadAvailableDays() {
      try {
        const r = await fetch('/api/scheduler/availability')
        const rules = await r.json()
        availableDays = new Set(rules.map(r => r.day_of_week))
      } catch(e) { availableDays = new Set() }
      renderCal()
    }

    function renderCal() {
      document.getElementById('calTitle').textContent = `${MONTH_NAMES[calMonth]} ${calYear}`
      const grid = document.getElementById('calGrid')
      grid.innerHTML = DAY_NAMES.map(d => `<div class="cal-day-label">${d}</div>`).join('')

      const first = new Date(calYear, calMonth, 1)
      const lastDay = new Date(calYear, calMonth + 1, 0).getDate()
      // weekday of first (0=Sun)
      for(let i = 0; i < first.getDay(); i++) {
        grid.innerHTML += `<div class="cal-cell"></div>`
      }
      for(let d = 1; d <= lastDay; d++) {
        const cellDate = new Date(calYear, calMonth, d)
        const iso = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`
        const isPast = cellDate < new Date(today.getFullYear(), today.getMonth(), today.getDate())
        // JS getDay(): 0=Sun,1=Mon … → convert to Mon=0 … Sun=6
        const dow = (cellDate.getDay() + 6) % 7
        const avail = !isPast && availableDays.has(dow)
        const isToday = cellDate.toDateString() === today.toDateString()
        const isSel = iso === selectedDate
        let cls = 'cal-cell'
        if(avail) cls += ' available'
        if(isPast) cls += ' past'
        if(isToday) cls += ' today'
        if(isSel) cls += ' selected'
        grid.innerHTML += `<div class="${cls}" data-date="${avail ? iso : ''}">${d}</div>`
      }
      grid.querySelectorAll('.cal-cell.available').forEach(el => {
        el.addEventListener('click', () => selectDate(el.dataset.date))
      })
    }

    async function selectDate(iso) {
      selectedDate = iso
      selectedSlot = null
      renderCal()
      const slotsTitle = document.getElementById('slotsTitle')
      const slotsGrid  = document.getElementById('slotsGrid')
      const d = new Date(iso + 'T00:00:00')
      slotsTitle.textContent = d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric'})
      slotsGrid.innerHTML = '<div class="muted" style="font-size:13px;grid-column:1/-1;">Loading slots…</div>'
      document.getElementById('bookFormCard').style.display = 'none'

      const r = await fetch(`/api/scheduler/slots?date=${iso}`)
      const slots = await r.json()
      if(!slots.length) {
        slotsGrid.innerHTML = '<div class="muted" style="font-size:13px;grid-column:1/-1;">No slots available on this date.</div>'
        return
      }
      slotsGrid.innerHTML = slots.map(s => {
        const [h,m] = s.split(':').map(Number)
        const ampm = h >= 12 ? 'PM' : 'AM'
        const h12 = h % 12 || 12
        const label = `${h12}:${String(m).padStart(2,'0')} ${ampm}`
        return `<button class="slot-btn" data-slot="${s}">${label}</button>`
      }).join('')

      slotsGrid.querySelectorAll('.slot-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          slotsGrid.querySelectorAll('.slot-btn').forEach(b => b.classList.remove('selected'))
          btn.classList.add('selected')
          selectedSlot = btn.dataset.slot
          document.getElementById('bookFormCard').style.display = ''
          document.getElementById('bookFormCard').scrollIntoView({behavior:'smooth',block:'nearest'})
        })
      })
    }

    document.getElementById('calPrev').addEventListener('click', () => {
      calMonth--
      if(calMonth < 0){ calMonth = 11; calYear-- }
      renderCal()
    })
    document.getElementById('calNext').addEventListener('click', () => {
      calMonth++
      if(calMonth > 11){ calMonth = 0; calYear++ }
      renderCal()
    })

    document.getElementById('bookSubmitBtn').addEventListener('click', async () => {
      const errEl = document.getElementById('bfError')
      errEl.style.display = 'none'
      const name  = document.getElementById('bfName').value.trim()
      const email = document.getElementById('bfEmail').value.trim()
      if(!name || !email){ errEl.textContent = 'Name and email are required.'; errEl.style.display='block'; return }
      if(!selectedDate || !selectedSlot){ errEl.textContent = 'Please select a date and time.'; errEl.style.display='block'; return }

      const btn = document.getElementById('bookSubmitBtn')
      btn.disabled = true
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Booking…'

      const res = await fetch('/api/scheduler/book', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({
          date: selectedDate,
          start_time: selectedSlot,
          name,
          email,
          phone: document.getElementById('bfPhone').value.trim(),
          notes: document.getElementById('bfNotes').value.trim(),
        })
      })
      const j = await res.json().catch(() => ({}))
      if(!res.ok){
        errEl.textContent = j.error || 'Could not complete booking. Please try again.'
        errEl.style.display = 'block'
        btn.disabled = false
        btn.innerHTML = '<i class="fas fa-calendar-check"></i> Confirm Booking'
        return
      }
      // Success
      const d = new Date(selectedDate + 'T00:00:00')
      const [h,m] = selectedSlot.split(':').map(Number)
      const ampm = h >= 12 ? 'PM' : 'AM'
      const h12 = h % 12 || 12
      const timeLabel = `${h12}:${String(m).padStart(2,'0')} ${ampm}`
      document.getElementById('bookingFlow').style.display = 'none'
      document.getElementById('bookConfirm').style.display = ''
      document.getElementById('confirmDetails').textContent =
        `${d.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'})} at ${timeLabel}`
      document.getElementById('confirmEmail').textContent = email
    })

    loadAvailableDays()
  </script>
</body>
</html>
