<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>{{ template.name }} — Email Builder — JBJ Management</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <div class="brand">
        <a href="/email-builder" class="btn"><i class="fas fa-arrow-left"></i> Back</a>
        <input id="ebNameInput" type="text" class="eb-name-input" value="{{ template.name }}" placeholder="Untitled email">
      </div>
      <div style="display:flex;gap:10px;align-items:center;">
        <span id="ebSaveStatus" class="muted" style="font-size:13px;"></span>
        <div class="view-toggle" role="group" aria-label="Preview width">
          <button id="ebDesktopBtn" class="view-toggle-btn active" type="button" title="Desktop width"><i class="fas fa-desktop"></i></button>
          <button id="ebMobileBtn" class="view-toggle-btn" type="button" title="Mobile width"><i class="fas fa-mobile-screen-button"></i></button>
        </div>
        <button id="ebVisibilityBtn" class="btn" title="Toggle public/private">
          <i id="ebVisibilityIcon" class="fas fa-lock"></i> <span id="ebVisibilityLabel">Private</span>
        </button>
        <button id="ebSaveBtn" class="btn"><i class="fas fa-check"></i> Save</button>
        <button id="ebSendBtn" class="btn btn-primary"><i class="fas fa-paper-plane"></i> Send</button>
      </div>
    </div>
  </header>

  <main class="container eb-builder-layout">

    <!-- Left: content blocks palette -->
    <aside class="filters-sidebar eb-blocks-sidebar">
      <div class="filters-scroll">
        <h3 class="filters-title">Content Blocks</h3>

        <div class="filter-section">
          <h4>Text</h4>
          <div class="eb-block-palette">
            <button class="eb-block-tile" data-insert="heading" type="button">
              <span class="eb-block-tile-preview" style="font-size:15px;font-weight:700;border-bottom:2px solid #AD0304;padding-bottom:2px;">Heading</span>
              <span class="eb-block-tile-label">Heading</span>
            </button>
            <button class="eb-block-tile" data-insert="subheading" type="button">
              <span class="eb-block-tile-preview" style="font-size:12px;font-weight:700;color:#555;">Subheading</span>
              <span class="eb-block-tile-label">Subheading</span>
            </button>
            <button class="eb-block-tile" data-insert="paragraph" type="button">
              <span class="eb-block-tile-preview" style="font-size:10px;line-height:1.4;">Lorem ipsum body text paragraph.</span>
              <span class="eb-block-tile-label">Paragraph</span>
            </button>
            <button class="eb-block-tile" data-insert="quote" type="button">
              <span class="eb-block-tile-preview" style="border-left:3px solid #AD0304;padding-left:6px;font-style:italic;font-size:10px;">"Great quote"</span>
              <span class="eb-block-tile-label">Quote</span>
            </button>
          </div>
        </div>

        <div class="filter-section">
          <h4>Layout</h4>
          <div class="eb-block-palette">
            <button class="eb-block-tile" data-insert="divider" type="button">
              <span class="eb-block-tile-preview"><hr style="border:none;border-top:2px solid #ccc;margin:8px 0;"></span>
              <span class="eb-block-tile-label">Divider</span>
            </button>
            <button class="eb-block-tile" data-insert="spacer" type="button">
              <span class="eb-block-tile-preview" style="background:repeating-linear-gradient(45deg,#f5f5f5,#f5f5f5 3px,#fff 3px,#fff 8px);height:20px;display:block;border-radius:4px;"></span>
              <span class="eb-block-tile-label">Spacer</span>
            </button>
            <button class="eb-block-tile" data-insert="columns" type="button">
              <span class="eb-block-tile-preview" style="display:flex;gap:3px;"><span style="flex:1;background:#f0f0f0;height:20px;border-radius:2px;"></span><span style="flex:1;background:#f0f0f0;height:20px;border-radius:2px;"></span></span>
              <span class="eb-block-tile-label">2 Columns</span>
            </button>
            <button class="eb-block-tile" data-insert="announcement" type="button">
              <span class="eb-block-tile-preview" style="background:#1a1a1a;color:#fff;font-size:9px;padding:4px 6px;border-radius:4px;text-align:center;">📢 Announcement</span>
              <span class="eb-block-tile-label">Announcement</span>
            </button>
          </div>
        </div>

        <div class="filter-section">
          <h4>Media & Actions</h4>
          <div class="eb-block-palette">
            <button class="eb-block-tile" data-insert="logo" type="button">
              <span class="eb-block-tile-preview" style="text-align:center;font-size:9px;font-weight:700;color:#AD0304;letter-spacing:1px;">JBJ LOGO</span>
              <span class="eb-block-tile-label">Logo</span>
            </button>
            <button class="eb-block-tile" data-insert="image" type="button">
              <span class="eb-block-tile-preview" style="background:#f0f0f0;display:flex;align-items:center;justify-content:center;height:20px;border-radius:4px;font-size:12px;color:#aaa;"><i class="fas fa-image"></i></span>
              <span class="eb-block-tile-label">Image</span>
            </button>
            <button class="eb-block-tile" data-insert="cta" type="button">
              <span class="eb-block-tile-preview" style="text-align:center;"><span style="background:#AD0304;color:#fff;font-size:9px;padding:3px 8px;border-radius:999px;display:inline-block;">Click Here</span></span>
              <span class="eb-block-tile-label">CTA Button</span>
            </button>
            <button class="eb-block-tile" data-insert="social" type="button">
              <span class="eb-block-tile-preview" style="text-align:center;font-size:11px;color:#555;letter-spacing:3px;"><i class="fab fa-facebook-f"></i> <i class="fab fa-instagram"></i> <i class="fab fa-linkedin-in"></i></span>
              <span class="eb-block-tile-label">Social Links</span>
            </button>
          </div>
        </div>

        <div class="filter-section">
          <h4>Closings</h4>
          <div class="eb-block-palette">
            <button class="eb-block-tile eb-block-tile-wide" data-insert="signature" type="button">
              <span class="eb-block-tile-preview" style="font-size:9px;"><strong>Your Name</strong><br><span style="color:#888;">Title · Organization</span></span>
              <span class="eb-block-tile-label">Signature</span>
            </button>
            <button class="eb-block-tile eb-block-tile-wide" data-insert="footer" type="button">
              <span class="eb-block-tile-preview" style="text-align:center;font-size:8px;color:#aaa;">JBJ Management · Dallas, TX<br>Unsubscribe</span>
              <span class="eb-block-tile-label">Footer</span>
            </button>
          </div>
        </div>
      </div>
    </aside>

    <!-- Center: compose pane -->
    <div class="eb-compose">
      <input id="ebSubjectInput" type="text" class="eb-subject-input" value="{{ template.subject or '' }}" placeholder="Subject">

      <div class="eb-toolbar" role="toolbar" aria-label="Formatting">
        <select id="ebFormatSelect" title="Text style">
          <option value="P">Normal</option>
          <option value="H2">Heading</option>
          <option value="H3">Subheading</option>
          <option value="H4">Small heading</option>
        </select>
        <select id="ebFontSizeSelect" title="Font size">
          <option value="">Size</option>
          <option value="12px">12</option>
          <option value="14px">14</option>
          <option value="16px">16</option>
          <option value="18px">18</option>
          <option value="20px">20</option>
          <option value="24px">24</option>
          <option value="28px">28</option>
          <option value="32px">32</option>
        </select>
        <span class="eb-toolbar-sep"></span>
        <button type="button" data-cmd="bold" title="Bold (Cmd+B)"><i class="fas fa-bold"></i></button>
        <button type="button" data-cmd="italic" title="Italic (Cmd+I)"><i class="fas fa-italic"></i></button>
        <button type="button" data-cmd="underline" title="Underline (Cmd+U)"><i class="fas fa-underline"></i></button>
        <button type="button" data-cmd="strikeThrough" title="Strikethrough"><i class="fas fa-strikethrough"></i></button>
        <span class="eb-toolbar-sep"></span>
        <button type="button" data-cmd="insertUnorderedList" title="Bullet list"><i class="fas fa-list-ul"></i></button>
        <button type="button" data-cmd="insertOrderedList" title="Numbered list"><i class="fas fa-list-ol"></i></button>
        <button type="button" data-cmd="indent" title="Indent"><i class="fas fa-indent"></i></button>
        <button type="button" data-cmd="outdent" title="Outdent"><i class="fas fa-outdent"></i></button>
        <span class="eb-toolbar-sep"></span>
        <button type="button" data-cmd="justifyLeft" title="Align left"><i class="fas fa-align-left"></i></button>
        <button type="button" data-cmd="justifyCenter" title="Align center"><i class="fas fa-align-center"></i></button>
        <button type="button" data-cmd="justifyRight" title="Align right"><i class="fas fa-align-right"></i></button>
        <span class="eb-toolbar-sep"></span>
        <label class="eb-toolbar-color" title="Text color">
          <i class="fas fa-font"></i>
          <input type="color" id="ebColorInput" value="#000000">
        </label>
        <label class="eb-toolbar-color" title="Highlight color" style="background:rgba(255,220,0,0.25);">
          <i class="fas fa-highlighter"></i>
          <input type="color" id="ebHighlightInput" value="#ffff00">
        </label>
        <span class="eb-toolbar-sep"></span>
        <!-- Merge tags -->
        <div class="export-wrap">
          <button type="button" id="ebMergeBtn" title="Insert merge tag (personalization)"><i class="fas fa-user-tag"></i></button>
          <div id="ebMergeMenu" class="export-menu" style="display:none;min-width:180px;">
            <div style="padding:8px 12px 4px;font-size:11px;font-weight:600;color:#888;text-transform:uppercase;letter-spacing:.5px;">Merge Tags</div>
            <button type="button" class="export-menu-item" data-merge="{{first_name}}"><i class="fas fa-tag"></i> First Name</button>
            <button type="button" class="export-menu-item" data-merge="{{last_name}}"><i class="fas fa-tag"></i> Last Name</button>
            <button type="button" class="export-menu-item" data-merge="{{full_name}}"><i class="fas fa-tag"></i> Full Name</button>
            <button type="button" class="export-menu-item" data-merge="{{organization}}"><i class="fas fa-tag"></i> Organization</button>
            <button type="button" class="export-menu-item" data-merge="{{title}}"><i class="fas fa-tag"></i> Title / Role</button>
          </div>
        </div>
        <!-- Link + media -->
        <button type="button" id="ebLinkBtn" title="Insert link"><i class="fas fa-link"></i></button>
        <div class="export-wrap">
          <button type="button" id="ebAttachBtn" title="Attach file or insert image"><i class="fas fa-paperclip"></i></button>
          <div id="ebAttachMenu" class="export-menu" style="display:none;">
            <button type="button" class="export-menu-item" id="ebAttachFileItem"><i class="fas fa-paperclip"></i> Attach a file</button>
            <button type="button" class="export-menu-item" id="ebInsertImgItem"><i class="fas fa-image"></i> Insert image</button>
          </div>
        </div>
        <input type="file" id="ebFileInput" multiple style="display:none;">
        <input type="file" id="ebImgUploadInput" accept="image/*" style="position:fixed;left:-9999px;top:0;opacity:0.001;pointer-events:auto;width:1px;height:1px;">
        <span class="eb-toolbar-sep"></span>
        <button type="button" data-cmd="removeFormat" title="Clear formatting"><i class="fas fa-text-slash"></i></button>
      </div>

      <div id="ebAttachmentList" class="eb-attachment-list"></div>

      <div class="eb-canvas-wrap">
        <div id="ebEditor" class="eb-canvas eb-canvas-desktop" contenteditable="true"></div>
      </div>
    </div>
  </main>

  <!-- Send modal (single address + segment) -->
  <div id="sendEmailModal" class="modal" style="display:none;">
    <div class="modal-content" role="dialog" aria-modal="true" aria-labelledby="sendEmailTitle" style="max-width:520px;">
      <button id="closeSendEmailModal" class="close">×</button>
      <h3 id="sendEmailTitle" style="margin:0 0 16px;">Send Email</h3>

      <!-- Tab bar -->
      <div style="display:flex;gap:0;border-bottom:2px solid #eee;margin-bottom:16px;">
        <button id="ebSendTabSingle" class="eb-send-tab active" type="button">Single address</button>
        <button id="ebSendTabBulk" class="eb-send-tab" type="button">Send to contacts</button>
      </div>

      <!-- Single send pane -->
      <div id="ebSendPaneSingle">
        <label for="sendEmailTo" style="display:block;margin-top:4px;font-weight:600;font-size:14px;">To<br>
          <input id="sendEmailTo" type="email" placeholder="name@example.com" required style="margin-top:4px;">
        </label>
        <p id="sendEmailAttachmentSummary" class="muted" style="margin-top:10px;">No files attached. Use the <i class="fas fa-paperclip"></i> button in the toolbar to attach one.</p>
        <div style="display:flex;gap:8px;margin-top:12px;">
          <button id="sendEmailConfirmBtn" class="btn btn-primary"><i class="fas fa-paper-plane"></i> Send</button>
        </div>
        <div id="sendEmailStatus" class="muted" style="margin-top:8px;"></div>
      </div>

      <!-- Bulk send pane -->
      <div id="ebSendPaneBulk" style="display:none;">
        <p class="muted" style="margin:0 0 12px;font-size:13px;">Send to all contacts with a matching tag. Merge tags like <code>{{first_name}}</code> are replaced per-contact.</p>
        <label style="display:block;font-weight:600;font-size:14px;margin-bottom:8px;">Filter by tag
          <select id="ebBulkTagSelect" style="margin-top:4px;width:100%;padding:8px;border-radius:8px;border:1px solid rgba(148,153,156,0.4);font-size:14px;">
            <option value="">— All contacts with email —</option>
          </select>
        </label>
        <p id="ebBulkPreview" class="muted" style="font-size:13px;margin:8px 0 12px;"></p>
        <div style="display:flex;gap:8px;margin-top:4px;">
          <button id="ebBulkSendBtn" class="btn btn-primary"><i class="fas fa-paper-plane"></i> Send to contacts</button>
        </div>
        <div id="ebBulkStatus" class="muted" style="margin-top:8px;"></div>
      </div>
    </div>
  </div>

  <!-- Hyperlink modal -->
  <div id="ebLinkModal" class="modal" style="display:none;">
    <div class="modal-content" role="dialog" aria-modal="true" style="max-width:420px;">
      <button id="ebLinkModalClose" class="close">×</button>
      <h3 style="margin:0 0 14px;">Insert Link</h3>
      <label style="display:block;font-weight:600;font-size:14px;margin-bottom:8px;">Link text
        <input id="ebLinkText" type="text" placeholder="Click here" style="margin-top:4px;">
      </label>
      <label style="display:block;font-weight:600;font-size:14px;margin-bottom:8px;">URL
        <input id="ebLinkUrl" type="url" placeholder="https://" style="margin-top:4px;">
      </label>
      <label style="display:flex;align-items:center;gap:8px;font-size:14px;margin-bottom:14px;">
        <input id="ebLinkNewTab" type="checkbox" checked> Open in new tab
      </label>
      <div style="display:flex;gap:8px;">
        <button id="ebLinkInsertBtn" class="btn btn-primary"><i class="fas fa-link"></i> Insert</button>
        <button id="ebLinkModalClose2" class="btn">Cancel</button>
      </div>
    </div>
  </div>

  <script>
    window.EMAIL_TEMPLATE_ID = {{ template.id }}
    window.EMAIL_TEMPLATE = {{ template.to_dict()|tojson }}
  </script>
  <script src="/static/js/email-builder.js"></script>
</body>
</html>
