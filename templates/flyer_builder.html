<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>{{ template.name }} — Flyer Builder — JBJ Management</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <header class="site-header">
    <div class="container header-inner">
      <div class="brand">
        <a href="/flyer-builder" class="btn"><i class="fas fa-arrow-left"></i> Back</a>
        <input id="fbNameInput" type="text" class="eb-name-input" value="{{ template.name }}" placeholder="Untitled flyer">
      </div>
      <div style="display:flex;gap:10px;align-items:center;">
        <span id="fbSaveStatus" class="muted" style="font-size:13px;"></span>
        <button id="fbSaveBtn" class="btn"><i class="fas fa-check"></i> Save</button>
        <button id="fbRenderBtn" class="btn btn-primary"><i class="fas fa-download"></i> Export PNG</button>
      </div>
    </div>
  </header>

  <main class="container fb-layout">
    <aside class="filters-sidebar fb-palette-panel">
      <div class="filters-scroll">
        <h3 class="filters-title">Add Element</h3>
        <div class="eb-palette-list">
          <button type="button" class="eb-palette-item" data-add="shape"><i class="fas fa-square"></i> Shape</button>
          <button type="button" class="eb-palette-item" data-add="heading"><i class="fas fa-heading"></i> Heading</button>
          <button type="button" class="eb-palette-item" data-add="text"><i class="fas fa-paragraph"></i> Text</button>
          <button type="button" class="eb-palette-item" data-add="logo"><i class="fas fa-star"></i> Logo</button>
          <button type="button" class="eb-palette-item" data-add="image"><i class="fas fa-image"></i> Image</button>
        </div>
        <div class="filter-section">
          <h4>Background</h4>
          <input type="color" id="fbBgColor" value="#ffffff" style="width:100%;height:36px;border-radius:8px;border:1px solid rgba(148,153,156,0.4);cursor:pointer;">
        </div>
        <div class="filter-section">
          <h4>Canvas</h4>
          <p class="muted" style="font-size:12px;margin:0;">{{ 'Square 1080×1080' if template.format == 'square' else 'Portrait 1080×1536' }}</p>
        </div>
      </div>
    </aside>

    <div class="fb-canvas-area">
      <div id="fbCanvas" class="fb-canvas fb-canvas-{{ template.format }}"></div>
    </div>

    <aside id="fbStylePanel" class="filters-sidebar fb-style-panel">
      <div class="filters-scroll">
        <h3 class="filters-title">Element Style</h3>
        <div id="fbStylePanelBody"><p class="muted">Select an element to edit it.</p></div>
      </div>
    </aside>
  </main>

  <div id="fbRenderModal" class="modal" style="display:none;">
    <div class="modal-content" role="dialog" aria-modal="true">
      <button id="fbCloseRenderModal" class="close">×</button>
      <h3>Export PNG</h3>
      <div id="fbRenderStatus" class="muted" style="margin-bottom:8px;">Rendering…</div>
      <img id="fbRenderOutput" style="display:none;max-width:100%;border-radius:8px;" alt="Rendered flyer">
      <div style="margin-top:10px;">
        <a id="fbDownloadBtn" class="btn btn-primary" download="flyer.png" style="display:none;"><i class="fas fa-download"></i> Download</a>
      </div>
    </div>
  </div>

  <!-- File input lives at the top level of <body> so programmatic
       .click() is never blocked by a parent overflow or scroll container -->
  <input type="file" id="fbImageUpload" accept="image/*" style="display:none;">

  <script>
    window.FLYER_TEMPLATE_ID = {{ template.id }}
    window.FLYER_TEMPLATE = {{ template.to_dict()|tojson }}
  </script>
  <script src="/static/js/flyer-builder.js"></script>
</body>
</html>
