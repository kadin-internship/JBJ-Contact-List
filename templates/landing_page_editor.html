<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Edit — {{ page.title }} — JBJ Management</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="/static/css/style.css">
  <style>
    .lpe-layout { display:grid; grid-template-columns:340px 1fr; gap:0; height:calc(100vh - 60px); overflow:hidden; }
    .lpe-settings { overflow-y:auto; padding:24px 20px; border-right:1px solid rgba(148,153,156,0.18); background:#fafaf8; }
    .lpe-preview-wrap { overflow-y:auto; background:#e8e8e5; display:flex; flex-direction:column; align-items:center; padding:32px 24px; }
    .lpe-preview-frame { width:100%; max-width:560px; border-radius:16px; overflow:hidden; box-shadow:0 8px 32px rgba(0,0,0,0.14); background:#fff; }
    .field-group { margin-bottom:18px; }
    .field-group label { display:block; font-size:12px; font-weight:600; color:var(--muted); margin-bottom:5px; text-transform:uppercase; letter-spacing:.04em; }
    .field-group input[type=text], .field-group textarea, .field-group select { display:block; width:100%; padding:8px 10px; border-radius:8px; border:1px solid rgba(148,153,156,0.4); font-size:13px; font-family:inherit; box-sizing:border-box; }
    .field-group textarea { resize:vertical; min-height:80px; }
    .color-row { display:flex; align-items:center; gap:8px; }
    .color-row input[type=color] { width:38px; height:30px; border-radius:6px; border:1px solid rgba(148,153,156,0.4); cursor:pointer; padding:2px; }
    .color-row input[type=text] { flex:1; }
    .lpe-section-title { font-size:11px; font-weight:700; text-transform:uppercase; letter-spacing:.06em; color:var(--muted); margin:20px 0 12px; border-top:1px solid rgba(148,153,156,0.18); padding-top:16px; }
    .toggle-row { display:flex; align-items:center; justify-content:space-between; padding:6px 0; font-size:13px; }
    .toggle-row input[type=checkbox] { width:16px; height:16px; cursor:pointer; }
    .subs-table { width:100%; border-collapse:collapse; font-size:13px; margin-top:8px; }
    .subs-table th { text-align:left; padding:8px 10px; font-size:11px; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.04em; border-bottom:2px solid rgba(0,0,0,0.08); }
    .subs-table td { padding:10px 10px; border-bottom:1px solid rgba(0,0,0,0.05); }

    /* Live preview styles */
    .preview-hero { padding:48px 32px 32px; text-align:center; }
    .preview-hero h1 { font-family:'Archivo Black',sans-serif; font-size:26px; margin:0 0 10px; line-height:1.2; }
    .preview-hero p.sub { font-size:15px; margin:0 0 16px; opacity:.75; }
    .preview-body { padding:0 32px 24px; font-size:14px; line-height:1.6; white-space:pre-wrap; }
    .preview-form { background:rgba(0,0,0,0.04); padding:24px 32px 32px; }
    .preview-form h3 { font-size:15px; font-weight:700; margin:0 0 16px; }
    .preview-form input, .preview-form textarea { display:block; width:100%; padding:9px 12px; border-radius:8px; border:1px solid rgba(148,153,156,0.3); font-family:inherit; font-size:13px; margin-bottom:10px; box-sizing:border-box; background:#fff; }
    .preview-form textarea { min-height:72px; resize:none; }
    .preview-btn { display:inline-block; padding:12px 28px; border-radius:10px; border:none; font-size:15px; font-weight:700; font-family:'Archivo Black',sans-serif; cursor:pointer; width:100%; }
  </style>
</head>
<body>
  <header class="site-header" style="position:sticky;top:0;z-index:100;">
    <div class="container header-inner">
      <div class="brand">
        <a href="/admin/landing-pages" class="btn"><i class="fas fa-arrow-left"></i> Pages</a>
        <span style="font-weight:600;font-size:15px;" id="headerTitle">{{ page.title }}</span>
      </div>
      <div style="display:flex;gap:8px;align-items:center;">
        <span id="saveStatus" class="muted" style="font-size:13px;"></span>
        <a href="/p/{{ page.slug }}" target="_blank" class="btn"><i class="fas fa-arrow-up-right-from-square"></i> Preview</a>
        <button id="copyLinkBtn" class="btn"><i class="fas fa-copy"></i> Copy Link</button>
        <button id="saveBtn" class="btn btn-primary"><i class="fas fa-check"></i> Save</button>
      </div>
    </div>
  </header>

  <div class="lpe-layout">
    <!-- Settings panel -->
    <div class="lpe-settings">

      <div class="field-group">
        <label>Page Title</label>
        <input type="text" id="lpTitle" value="{{ page.title }}">
      </div>
      <div class="field-group">
        <label>Subtitle</label>
        <input type="text" id="lpSubtitle" value="{{ page.subtitle or '' }}" placeholder="Short tagline under the title">
      </div>
      <div class="field-group">
        <label>Body text</label>
        <textarea id="lpBody" placeholder="Optional longer description…">{{ page.body or '' }}</textarea>
      </div>

      <div class="lpe-section-title">Form</div>
      <div class="field-group">
        <label>Button text</label>
        <input type="text" id="lpButtonText" value="{{ page.button_text }}">
      </div>
      <div class="toggle-row">
        <span>Show phone field</span>
        <input type="checkbox" id="lpShowPhone" {% if page.show_phone %}checked{% endif %}>
      </div>
      <div class="toggle-row">
        <span>Show message field</span>
        <input type="checkbox" id="lpShowMessage" {% if page.show_message %}checked{% endif %}>
      </div>

      <div class="lpe-section-title">Colors</div>
      <div class="field-group">
        <label>Background</label>
        <div class="color-row">
          <input type="color" id="lpBgColorPicker" value="{{ page.bg_color }}">
          <input type="text" id="lpBgColor" value="{{ page.bg_color }}" maxlength="9">
        </div>
      </div>
      <div class="field-group">
        <label>Text color</label>
        <div class="color-row">
          <input type="color" id="lpTextColorPicker" value="{{ page.text_color }}">
          <input type="text" id="lpTextColor" value="{{ page.text_color }}" maxlength="9">
        </div>
      </div>
      <div class="field-group">
        <label>Button color</label>
        <div class="color-row">
          <input type="color" id="lpButtonColorPicker" value="{{ page.button_color }}">
          <input type="text" id="lpButtonColor" value="{{ page.button_color }}" maxlength="9">
        </div>
      </div>

      <div class="lpe-section-title">Pipeline</div>
      <div class="field-group">
        <label>Assign new leads to stage</label>
        <select id="lpPipelineStage">
          <option value="">— None —</option>
          {% for s in ['Lead','Engaged','Proposal','Client','Inactive'] %}
          <option value="{{ s }}" {% if page.pipeline_stage == s %}selected{% endif %}>{{ s }}</option>
          {% endfor %}
        </select>
      </div>

      <div class="lpe-section-title">Visibility</div>
      <div class="toggle-row">
        <span>Page is active (publicly accessible)</span>
        <input type="checkbox" id="lpIsActive" {% if page.is_active %}checked{% endif %}>
      </div>

      <div class="lpe-section-title">Submissions</div>
      <div id="subsWrap">
        <div class="muted" style="font-size:13px;">Loading…</div>
      </div>
    </div>

    <!-- Live preview -->
    <div class="lpe-preview-wrap">
      <div class="lpe-preview-frame" id="previewFrame">
        <div class="preview-hero" id="pvHero">
          <h1 id="pvTitle">{{ page.title }}</h1>
          <p class="sub" id="pvSubtitle">{{ page.subtitle or '' }}</p>
        </div>
        <div class="preview-body" id="pvBody">{{ page.body or '' }}</div>
        <div class="preview-form">
          <h3>Get in touch</h3>
          <input type="text" placeholder="Full name *" disabled>
          <input type="email" placeholder="Email *" disabled>
          <div id="pvPhoneField"><input type="tel" placeholder="Phone" disabled></div>
          <div id="pvMessageField"><textarea placeholder="Message" disabled></textarea></div>
          <button class="preview-btn" id="pvBtn" disabled>{{ page.button_text }}</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    const PAGE_ID = {{ page.id }}
    const PUBLIC_URL = window.location.origin + '/p/{{ page.slug }}'

    // Live preview wiring
    function bind(inputId, fn) {
      document.getElementById(inputId)?.addEventListener('input', fn)
    }
    function syncColor(pickerId, textId, applyFn) {
      const picker = document.getElementById(pickerId)
      const text   = document.getElementById(textId)
      picker.addEventListener('input', () => { text.value = picker.value; applyFn(picker.value) })
      text.addEventListener('input', () => { if(/^#[0-9a-fA-F]{3,6}$/.test(text.value)){ picker.value = text.value; applyFn(text.value) } })
    }

    bind('lpTitle',      () => { document.getElementById('pvTitle').textContent = document.getElementById('lpTitle').value; document.getElementById('headerTitle').textContent = document.getElementById('lpTitle').value })
    bind('lpSubtitle',   () => document.getElementById('pvSubtitle').textContent = document.getElementById('lpSubtitle').value)
    bind('lpBody',       () => document.getElementById('pvBody').textContent = document.getElementById('lpBody').value)
    bind('lpButtonText', () => document.getElementById('pvBtn').textContent = document.getElementById('lpButtonText').value)

    document.getElementById('lpShowPhone').addEventListener('change', e => {
      document.getElementById('pvPhoneField').style.display = e.target.checked ? '' : 'none'
    })
    document.getElementById('lpShowMessage').addEventListener('change', e => {
      document.getElementById('pvMessageField').style.display = e.target.checked ? '' : 'none'
    })

    syncColor('lpBgColorPicker', 'lpBgColor', v => {
      document.getElementById('pvHero').style.background = v
      document.getElementById('pvHero').style.color = document.getElementById('lpTextColor').value
    })
    syncColor('lpTextColorPicker', 'lpTextColor', v => {
      document.getElementById('pvHero').style.color = v
    })
    syncColor('lpButtonColorPicker', 'lpButtonColor', v => {
      document.getElementById('pvBtn').style.background = v
      document.getElementById('pvBtn').style.color = '#fff'
    })

    // Init preview colors
    document.getElementById('pvHero').style.background = document.getElementById('lpBgColor').value
    document.getElementById('pvHero').style.color = document.getElementById('lpTextColor').value
    document.getElementById('pvBtn').style.background = document.getElementById('lpButtonColor').value
    document.getElementById('pvBtn').style.color = '#fff'

    // Save
    document.getElementById('saveBtn').addEventListener('click', async () => {
      const status = document.getElementById('saveStatus')
      status.textContent = 'Saving…'
      const res = await fetch(`/api/landing-pages/${PAGE_ID}`, {
        method: 'PATCH',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({
          title:          document.getElementById('lpTitle').value.trim(),
          subtitle:       document.getElementById('lpSubtitle').value.trim(),
          body:           document.getElementById('lpBody').value.trim(),
          button_text:    document.getElementById('lpButtonText').value.trim(),
          show_phone:     document.getElementById('lpShowPhone').checked,
          show_message:   document.getElementById('lpShowMessage').checked,
          bg_color:       document.getElementById('lpBgColor').value,
          text_color:     document.getElementById('lpTextColor').value,
          button_color:   document.getElementById('lpButtonColor').value,
          pipeline_stage: document.getElementById('lpPipelineStage').value || null,
          is_active:      document.getElementById('lpIsActive').checked,
        }),
      })
      status.textContent = res.ok ? 'Saved!' : 'Error saving.'
      setTimeout(() => status.textContent = '', 2000)
    })

    document.getElementById('copyLinkBtn').addEventListener('click', () => {
      navigator.clipboard.writeText(PUBLIC_URL)
      const btn = document.getElementById('copyLinkBtn')
      const orig = btn.innerHTML
      btn.innerHTML = '<i class="fas fa-check"></i> Copied!'
      setTimeout(() => btn.innerHTML = orig, 1500)
    })

    // Load submissions
    async function loadSubs() {
      const wrap = document.getElementById('subsWrap')
      const res = await fetch(`/api/landing-pages/${PAGE_ID}/submissions`)
      const subs = await res.json()
      if(!subs.length) {
        wrap.innerHTML = '<p class="muted" style="font-size:13px;">No submissions yet.</p>'
        return
      }
      wrap.innerHTML = `<table class="subs-table">
        <thead><tr><th>Name</th><th>Email</th><th>Date</th></tr></thead>
        <tbody>${subs.map(s => `<tr>
          <td>${s.name}</td>
          <td><a href="mailto:${s.email}" style="color:var(--primary);">${s.email}</a></td>
          <td class="muted">${new Date(s.created_at).toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'})}</td>
        </tr>`).join('')}</tbody>
      </table>`
    }
    loadSubs()
  </script>
</body>
</html>
