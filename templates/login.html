<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Sign In - JBJ Management Contact Hub</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:opsz,wght@14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
  <div class="hero">
    <div class="hero-overlay"></div>
    <div class="hero-pattern" aria-hidden="true"></div>
    <div class="hero-center">
      <div class="hero-card">
        <img class="hero-logo" src="/static/img/logo.png" alt="JBJ Management">
        <div class="hero-divider" aria-hidden="true"></div>
        <p class="hero-subtitle">Contact Hub</p>
        {% if error %}<div class="login-error">{{ error }}</div>{% endif %}
        <form class="login-form" method="post" action="/login">
          <label class="sr-only" for="username">Username</label>
          <input id="username" name="username" placeholder="Username" autocomplete="username" value="{{ username or '' }}" required {% if not username %}autofocus{% endif %} />
          <label class="sr-only" for="password">Password</label>
          <input id="password" name="password" type="password" placeholder="Password" autocomplete="current-password" required />
          <button type="submit" class="btn btn-hero">Sign In <span aria-hidden="true">→</span></button>
        </form>
      </div>
    </div>
  </div>
</body>
</html>
